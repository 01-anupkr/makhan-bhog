<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="50%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8102e"/>
      <stop offset="100%" style="stop-color:#a00d24"/>
    </linearGradient>
    <linearGradient id="wheat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a017"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" rx="0" fill="url(#bg)"/>
  <!-- Decorative border -->
  <rect x="10" y="10" width="380" height="280" rx="12" fill="none" stroke="#92400e" stroke-width="2" stroke-dasharray="8 4" opacity="0.4"/>
  <!-- Top ribbon -->
  <rect x="60" y="30" width="280" height="36" rx="4" fill="url(#ribbon)"/>
  <text x="200" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#fff" letter-spacing="3">SHAH'S BROTHERS</text>
  <!-- Wheat stalks left -->
  <g transform="translate(55,120) rotate(-15)" opacity="0.7">
    <line x1="0" y1="60" x2="0" y2="0" stroke="#92400e" stroke-width="2"/>
    <ellipse cx="-4" cy="10" rx="5" ry="12" fill="url(#wheat)" transform="rotate(-20)"/>
    <ellipse cx="4" cy="20" rx="5" ry="12" fill="url(#wheat)" transform="rotate(20)"/>
    <ellipse cx="-4" cy="30" rx="5" ry="12" fill="url(#wheat)" transform="rotate(-20)"/>
    <ellipse cx="4" cy="40" rx="5" ry="12" fill="url(#wheat)" transform="rotate(20)"/>
    <ellipse cx="0" cy="0" rx="4" ry="10" fill="url(#wheat)"/>
  </g>
  <!-- Wheat stalks right -->
  <g transform="translate(345,120) rotate(15)" opacity="0.7">
    <line x1="0" y1="60" x2="0" y2="0" stroke="#92400e" stroke-width="2"/>
    <ellipse cx="4" cy="10" rx="5" ry="12" fill="url(#wheat)" transform="rotate(20)"/>
    <ellipse cx="-4" cy="20" rx="5" ry="12" fill="url(#wheat)" transform="rotate(-20)"/>
    <ellipse cx="4" cy="30" rx="5" ry="12" fill="url(#wheat)" transform="rotate(20)"/>
    <ellipse cx="-4" cy="40" rx="5" ry="12" fill="url(#wheat)" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="4" ry="10" fill="url(#wheat)"/>
  </g>
  <!-- Brand Name -->
  <text x="200" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#92400e">Makhan Bhog</text>
  <!-- Tagline underline -->
  <line x1="110" y1="132" x2="290" y2="132" stroke="#d4a017" stroke-width="2"/>
  <!-- Product Type -->
  <text x="200" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#c8102e" letter-spacing="6">PREMIUM ATTA</text>
  <!-- Quality badge -->
  <circle cx="200" cy="200" r="30" fill="none" stroke="#92400e" stroke-width="2"/>
  <text x="200" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#92400e" font-weight="bold">100%</text>
  <text x="200" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#92400e" font-weight="bold">PURE</text>
  <!-- Bottom text -->
  <text x="200" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#92400e" letter-spacing="1">Whole Wheat Flour — Soft &amp; Nutritious</text>
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666" letter-spacing="1">Chakki Fresh | Since Generations</text>
</svg>
