<!DOCTYPE html>
<html>
<head><title>Generate App Icons</title></head>
<body>
<h2>Right-click each image → "Save Image As" to save the icons</h2>
<h3>192x192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>512x512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');

  // Background gradient
  const grad = ctx.createRadialGradient(s/2, s/2, s*0.1, s/2, s/2, s*0.6);
  grad.addColorStop(0, '#f5e6c8');
  grad.addColorStop(1, '#b8860b');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s*0.15);
  ctx.fill();

  // Inner circle
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.arc(s/2, s/2, s*0.38, 0, Math.PI*2);
  ctx.fill();

  // Wheat icon (🌾 emoji)
  ctx.font = `${s*0.35}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🌾', s/2, s*0.38);

  // Brand name
  ctx.fillStyle = '#5a3e1b';
  ctx.font = `bold ${s*0.1}px sans-serif`;
  ctx.fillText('MAKHAN', s/2, s*0.66);
  ctx.fillText('BHOG', s/2, s*0.78);

  // Small sub-text
  ctx.fillStyle = '#8B6914';
  ctx.font = `${s*0.045}px sans-serif`;
  ctx.fillText("Shah's Brothers", s/2, s*0.88);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Also generate downloadable PNGs
['c192','c512'].forEach(id => {
  const canvas = document.getElementById(id);
  const link = document.createElement('a');
  const size = canvas.width;
  link.download = `icon-${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.textContent = `Download icon-${size}.png`;
  link.style.display = 'block';
  link.style.margin = '10px 0';
  link.style.fontSize = '18px';
  canvas.parentNode.insertBefore(link, canvas.nextSibling);
});
</script>
</body>
</html>
